packages:
  - "apps/*"
  - "shared"

allowBuilds:
  "@casoon/astro-post-audit": true
  esbuild: true
  sharp: true
  workerd: true

catalog:
  # Astro v7 (stable)
  astro: ^7.0.9
  "@astrojs/check": ^0.9.9
  "@astrojs/cloudflare": ^14.1.3
  "@astrojs/mdx": ^7.0.3
  "@astrojs/rss": ^4.0.19
  "@astrojs/svelte": ^9.0.1
  "@axe-core/playwright": ^4.12.1
  "@casoon/astro-post-audit": ^0.4.6
  "@casoon/astro-structured-data": ^1.5.1
  "@casoon/astro-site-files": ^0.4.2
  "@casoon/astro-speed-measure": ^0.4.0

  # Tailwind v4
  tailwindcss: ^4.3.2
  "@tailwindcss/typography": ^0.5.20
  "@tailwindcss/vite": ^4.3.2
  tailwindcss-animate: ^1.0.7

  # Svelte 5
  svelte: ^5.56.5
  # fallow-ignore-next-line unused-catalog-entry
  "@sveltejs/vite-plugin-svelte": ^6.2.4
  "@lucide/svelte": ^1.24.0

  # Core
  gray-matter: ^4.0.3
  # rehype-slug and remark-gfm removed — Sätteri (Astro v7 default markdown) provides both natively
  unist-util-visit: ^5.1.0
  tsx: ^4.23.1
  typescript: ^6.0.3
  zod: ^4.4.3
  clsx: ^2.1.1
  tailwind-merge: ^3.6.0
  satori: ^0.28.0
  "@resvg/resvg-js": ^2.6.2
  sharp: ^0.35.3

  # Code analysis
  fallow: ^3.6.0

  # Deployment
  wrangler: ^4.111.0

  # Formatting & Linting (Biome only - no more ESLint/Prettier hybrid)
  "@biomejs/biome": ^2.5.4
  husky: ^9.1.7
  lint-staged: ^17.0.7

  # Fonts (reduced set)
  "@fontsource/inter": ^5.2.8
  "@fontsource/lora": ^5.2.8
  "@fontsource/fira-code": ^5.2.7
